<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Valle del Novilunio - Leyenda Clasificada</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1510;
            overflow: hidden; 
            font-family: 'Georgia', serif;
        }

        /* Contenedor principal de scroll */
        .map-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: auto; 
            display: block;
            background-color: #1a1510;
            z-index: 1;
            -webkit-overflow-scrolling: touch; 
        }

        /* Contenedor interno del mapa */
        .map-container {
            position: relative;
            width: 100%;
            height: auto;
            transform-origin: 0 0; 
            transition: transform 0.1s ease-out; 
            touch-action: pan-x pan-y; 
            z-index: 2;
        }

        .map-container img {
            width: 100%;
            height: auto;
            display: block;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* PUNTOS INTERACTIVOS */
        .hotspot {
            position: absolute;
            width: 6%;  
            height: 6%; 
            border-radius: 50%;
            background: rgba(212, 178, 133, 0); 
            border: 2px solid transparent;      
            cursor: pointer;
            transform: translate(-50%, -50%); 
            transition: background 0.3s ease, border-color 0.3s ease, transform 0.2s ease;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent; 
            z-index: 10; 
        }

        .hotspot:hover {
            background: rgba(212, 178, 133, 0.3); 
            border-color: rgba(255, 255, 255, 0.7);
            transform: translate(-50%, -50%) scale(1.1);
        }

        .hotspot.destello {
            background: rgba(212, 178, 133, 0.6) !important;
            border-color: #d4b285 !important;
            box-shadow: 0 0 20px #d4b285, 0 0 40px #d4b285;
            animation: parpadeo 0.5s ease infinite alternate;
        }

        @keyframes parpadeo {
            0% { transform: translate(-50%, -50%) scale(1); }
            100% { transform: translate(-50%, -50%) scale(1.4); }
        }

        /* INTERFAZ FIJA CON Z-INDEX MÁXIMO */
        .leyenda-btn {
            position: fixed; 
            top: 15px;
            right: 15px;
            background: #2a221a;
            color: #d4b285;
            border: 2px solid #d4b285;
            padding: 8px 16px;
            font-family: 'Georgia', serif;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            z-index: 9999 !important; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            -webkit-tap-highlight-color: transparent;
        }

        .side-controls {
            position: fixed; 
            top: 70px;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 9999 !important; 
        }

        .control-btn {
            background: #2a221a;
            color: #d4b285;
            border: 2px solid #d4b285;
            width: 42px;
            height: 42px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }

        .control-btn:active {
            background: #d4b285;
            color: #1a1510;
        }

        /* PANTALLAS EMERGENTES */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000; 
            opacity: 0;
            pointer-events: none; 
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
		position: relative;
            background: #2a221a;
            border: 3px solid #d4b285;
            border-radius: 10px;
            width: 90%;
            max-width: 480px;
            max-height: 85vh;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            transform: scale(0.8);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }
/* EL ESTILO DEFINITIVO PARA TU BOTÓN X, REINA */
.close-x-btn {
    position: absolute;
    top: 10px;
    right: 15px;
    background: none;
    border: none;
    color: #a48b6c; /* Color cobrizo suave a juego con tu interfaz */
    font-size: 2rem; /* Tamaño grande para que sea fácil pulsar con el dedo */
    font-weight: 300;
    line-height: 1;
    cursor: pointer;
    padding: 5px;
    transition: color 0.2s ease;
    -webkit-tap-highlight-color: transparent;
    z-index: 10001; /* Por encima de todo dentro del modal */
}

.close-x-btn:active, .close-x-btn:hover {
    color: #d4b285; /* Se ilumina en dorado al tocarlo */
}
        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        .modal-title {
            color: #d4b285;
            font-size: 1.3rem;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 1px solid #3a2f21;
            padding-bottom: 8px;
        }

        /* DISEÑO DE LAS PESTAÑAS (TABS), CIELA */
        .tabs-container {
            display: flex;
            gap: 4px;
            margin-bottom: 15px;
            border-bottom: 2px solid #3a2f21;
            overflow-x: auto; /* Permite scroll horizontal si las pestañas no caben en móviles */
            padding-bottom: 5px;
            scrollbar-width: none; /* Oculta barra en Firefox */
        }
        .tabs-container::-webkit-scrollbar {
            display: none; /* Oculta barra en Chrome/Safari */
        }

        .tab-btn {
            background: #1a1510;
            color: #a48b6c;
            border: 1px solid #3a2f21;
            border-bottom: none;
            padding: 8px 12px;
            font-family: 'Georgia', serif;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 6px 6px 0 0;
            cursor: pointer;
            white-space: nowrap; /* Evita que el texto se rompa en dos líneas */
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: #d4b285;
            color: #1a1510;
            border-color: #d4b285;
        }

        /* CONTENEDORES DE CONTENIDO POR CATEGORÍA */
        .lista-lugares {
            overflow-y: auto;
            text-align: left;
            margin-bottom: 15px;
            padding-right: 5px;
            flex-grow: 1;
            min-height: 150px;
            max-height: 45vh;
        }

        .tab-content {
            display: none; /* Ocultas por defecto */
        }

        .tab-content.active {
            display: block; /* Solo se muestra la pestaña activa */
        }

        .lugar-item {
            padding: 10px 8px;
            color: #e5d4bc;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.95rem;
            border-bottom: 1px solid #3a2f21;
            transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .lugar-item:last-child {
            border-bottom: none;
        }

        .lugar-item:active, .lugar-item:hover {
            background: rgba(212, 178, 133, 0.2);
            color: #fff;
        }

        .modal-desc {
            color: #e5d4bc;
            font-size: 1.05rem;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .close-btn {
            background: #d4b285;
            color: #1a1510;
            border: none;
            padding: 10px 24px;
            font-family: 'Georgia', serif;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
    </style>
</head>
<body>

    <button class="leyenda-btn" onclick="abrirLeyenda()">🗺️ Leyenda</button>

    <div class="side-controls">
        <button class="control-btn" onclick="hacerZoomIn(0.4)">+</button>
        <button class="control-btn" title="Ajustar Pantalla" onclick="restablecerVista()">🔄</button>
        <button class="control-btn" id="fullscreen-btn" onclick="alternarPantallaCompleta()">📱</button>
    </div>

   <div class="map-wrapper" id="map-wrapper">
        <div class="map-container" id="map-container">
            <img src="mapa.jpeg" alt="Valle del Novilunio">

            <div id="spot-1" class="hotspot" style="left: 39.8%; top: 57.5%;" role="button" onclick="abrirPopUp('🌳 Plaza Mayor', 'El corazón del pueblo. Un lugar ideal para observar quién entra y sale.')"></div>
            <div id="spot-2" class="hotspot" style="left: 40.2%; top: 47.2%;" role="button" onclick="abrirPopUp('🏛️ Ayuntamiento', 'El archivo municipal guarda documentos de 1996 que nadie quiere que salgan a la luz.')"></div>
            <div id="spot-3" class="hotspot" style="left: 46.5%; top: 34.5%;" role="button" onclick="abrirPopUp('⛪ Iglesia de Santa Ana', 'La vieja parroquia del pueblo. El párroco esconde algo bajo el altar...')"></div>
            <div id="spot-4" class="hotspot" style="left: 17.2%; top: 48.8%;" role="button" onclick="abrirPopUp('📐 Instituto Sierra del Novilunio', 'Donde los jóvenes estudian y los secretos locales se heredan de clase en clase.')"></div>
			<div id="spot-5" class="hotspot" style="left: 21.2%; top: 53.8%;" role="button" onclick="abrirPopUp('📚 Colegio Bellavista', 'Donde los jóvenes estudian y los secretos locales se heredan de clase en clase.')"></div>
			<div id="spot-6" class="hotspot" style="left: 50.5%; top: 39.5%;" role="button" onclick="abrirPopUp('🌳 Plaza los Cuatro Vientos', '')"></div>
        </div>
    </div>

    <div class="modal-overlay" id="leyenda-overlay" onclick="document.getElementById('leyenda-overlay').classList.remove('active')">
        <div class="modal-box" onclick="event.stopPropagation()">
            <button class="close-x-btn" onclick="document.getElementById('leyenda-overlay').classList.remove('active')">×</button>
			<h2 class="modal-title">Lugares de Interés</h2>
            
            <div class="tabs-container">
                <button class="tab-btn active" onclick="cambiarPestana(event, 'tab-publicos')">🏛️ Públicos</button>
                <button class="tab-btn" onclick="cambiarPestana(event, 'tab-servicios')">🛡️ Servicios</button>
                <button class="tab-btn" onclick="cambiarPestana(event, 'tab-viviendas')">🏠 Viviendas</button>
                <button class="tab-btn" onclick="cambiarPestana(event, 'tab-plazas')">🌳 Plazas</button>
            </div>

            <div class="lista-lugares">
                
                <div id="tab-publicos" class="tab-content active">
                    <div class="lugar-item" onclick="enfocarLugar('spot-2')">🏛️ Ayuntamiento</div>
                    <div class="lugar-item" onclick="enfocarLugar('spot-3')">⛪ Iglesia de Santa Ana</div>
                    <div class="lugar-item" onclick="enfocarLugar('spot-4')">📐 Instituto Sierra del Novilunio</div>
					<div class="lugar-item" onclick="enfocarLugar('spot-5')">📚 Colegio Bellavista</div>
                </div>

                <div id="tab-servicios" class="tab-content">
                    <div class="lugar-item" onclick="alert('Aquí puedes enlazar tu spot del cuartel, cariño')">📍 Cuartel de la Guardia Civil (Ejemplo)</div>
                    <div class="lugar-item" onclick="alert('Aquí enlazas el centro médico')">📍 Centro de Salud (Ejemplo)</div>
                </div>

                <div id="tab-viviendas" class="tab-content">
                    <div class="lugar-item" onclick="alert('Aquí enlazas la casa del sospechoso')">📍 Casa de la familia Alvear (Ejemplo)</div>
                </div>

                <div id="tab-plazas" class="tab-content">
                    <div class="lugar-item" onclick="enfocarLugar('spot-1')">🌳 Plaza Mayor</div>
					<div class="lugar-item" onclick="enfocarLugar('spot-1')">🌳 Plaza los Cuatro Vientos</div>
                </div>

            </div>
            
  
        </div>
    </div>

    <div class="modal-overlay" id="popup-overlay" onclick="document.getElementById('popup-overlay').classList.remove('active')">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h2 class="modal-title" id="popup-titulo">Título</h2>
            <p class="modal-desc" id="popup-descripcion">Descripción...</p>
            <button class="close-btn" onclick="document.getElementById('popup-overlay').classList.remove('active')">Volver al mapa</button>
        </div>
    </div>

    <script>
        let nivelZoom = 1.0;
        const maxZoom = 4.0;
        const minZoom = 1.0;

        const wrapper = document.getElementById('map-wrapper');
        const contenedor = document.getElementById('map-container');

        let dobleToqueDistanciaOriginal = 0;
        let zoomOriginalAlTocar = 1.0;
        let estaPellizcando = false;

        // FUNCIÓN NUEVA: INTERCAMBIAR PESTAÑAS, CIELA
        function cambiarPestana(evento, idTab) {
            // Ocultar todos los contenidos de pestañas
            const contenidos = document.querySelectorAll('.tab-content');
            contenidos.forEach(c => c.classList.remove('active'));

            // Desactivar todos los botones de pestañas
            const botones = document.querySelectorAll('.tab-btn');
            botones.forEach(b => b.classList.remove('active'));

            // Activar la pestaña actual y su botón correspondiente
            document.getElementById(idTab).classList.add('active');
            evento.currentTarget.classList.add('active');
        }

        // ZOOM TÁCTIL (CON DOS DEDOS)
        wrapper.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                estaPellizcando = true;
                dobleToqueDistanciaOriginal = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
                zoomOriginalAlTocar = nivelZoom;
            }
        }, { passive: true });

        wrapper.addEventListener('touchmove', (e) => {
            if (estaPellizcando && e.touches.length === 2) {
                const nuevaDistancia = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
                const factorCambio = nuevaDistancia / dobleToqueDistanciaOriginal;
                let nuevoZoom = zoomOriginalAlTocar * factorCambio;

                if (nuevoZoom > maxZoom) nuevoZoom = maxZoom;
                if (nuevoZoom < minZoom) nuevoZoom = minZoom;

                if (nuevoZoom !== nivelZoom) {
                    const centroX = wrapper.scrollLeft + (wrapper.clientWidth / 2);
                    const centroY = wrapper.scrollTop + (wrapper.clientHeight / 2);
                    const antiguoZoom = nivelZoom;

                    nivelZoom = nuevoZoom;
                    
                    aplicarEscalaMapa();

                    const factorRedimension = nivelZoom / antiguoZoom;
                    wrapper.scrollLeft = (centroX * factorRedimension) - (wrapper.clientWidth / 2);
                    wrapper.scrollTop = (centroY * factorRedimension) - (wrapper.clientHeight / 2);
                }
            }
        }, { passive: true });

        wrapper.addEventListener('touchend', (e) => {
            if (e.touches.length < 2) { estaPellizcando = false; }
        });

        function aplicarEscalaMapa() {
            contenedor.style.transform = `scale(${nivelZoom})`;
            contenedor.style.width = `${100 * nivelZoom}%`;
            contenedor.style.height = `${100 * nivelZoom}%`; 
        }

        function hacerZoomIn(valor) {
            if (nivelZoom >= maxZoom) return;
            const centroX = wrapper.scrollLeft + (wrapper.clientWidth / 2);
            const centroY = wrapper.scrollTop + (wrapper.clientHeight / 2);
            const antiguoZoom = nivelZoom;

            nivelZoom += valor;
            if (nivelZoom > maxZoom) nivelZoom = maxZoom;

            aplicarEscalaMapa();

            const factorRedimension = nivelZoom / antiguoZoom;
            wrapper.scrollLeft = (centroX * factorRedimension) - (wrapper.clientWidth / 2);
            wrapper.scrollTop = (centroY * factorRedimension) - (wrapper.clientHeight / 2);
        }

        function restablecerVista() {
            nivelZoom = 1.0;
            contenedor.style.transform = `scale(1)`;
            contenedor.style.width = `100%`;
            contenedor.style.height = `auto`;
            wrapper.scrollTo({ top: 0, left: 0, behavior: 'smooth' });
        }

        function alternarPantallaCompleta() {
            const doc = document.documentElement;
            const boton = document.getElementById('fullscreen-btn');

            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (doc.requestFullscreen) { doc.requestFullscreen(); } 
                else if (doc.webkitRequestFullscreen) { doc.webkitRequestFullscreen(); }
                boton.innerText = "✖";
            } else {
                if (document.exitFullscreen) { document.exitFullscreen(); } 
                else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
                boton.innerText = "📱";
            }
        }

        function abrirLeyenda() {
            document.getElementById('leyenda-overlay').classList.add('active');
        }

        function abrirPopUp(titulo, descripcion) {
            document.getElementById('popup-titulo').innerText = titulo;
            document.getElementById('popup-descripcion').innerText = descripcion;
            document.getElementById('popup-overlay').classList.add('active');
        }

        function enfocarLugar(idSpot) {
            restablecerVista(); 
            
            document.getElementById('leyenda-overlay').classList.remove('active');
            
            if (nivelZoom === 1.0) {
                nivelZoom = 1.6;
                aplicarEscalaMapa();
            }
            
            const spot = document.getElementById(idSpot);
            if (spot) {
                setTimeout(() => {
                    const spotRect = spot.getBoundingClientRect();
                    const wrapperRect = wrapper.getBoundingClientRect();
                    
                    const destinoX = wrapper.scrollLeft + (spotRect.left - wrapperRect.left) - (wrapper.clientWidth / 2) + (spotRect.width / 2);
                    const destinoY = wrapper.scrollTop + (spotRect.top - wrapperRect.top) - (wrapper.clientHeight / 2) + (spotRect.height / 2);
                    
                    wrapper.scrollTo({
                        left: destinoX,
                        top: destinoY,
                        behavior: 'smooth'
                    });
                    
                    spot.classList.add('destello');
                    setTimeout(() => spot.classList.remove('destello'), 3000);
                }, 150);
            }
        }
    </script>

</body>
</html>
