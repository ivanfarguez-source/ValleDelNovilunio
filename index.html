<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Valle del Novilunio - Centrado Perfecto</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1510;
            overflow: hidden; 
            font-family: 'Georgia', serif;
        }

        /* Contenedor principal de scroll */
        .map-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: auto; 
            display: block;
            background-color: #1a1510;
        }

        /* Contenedor interno del mapa */
        .map-container {
            position: relative;
            width: 100%;
            height: auto;
            transform-origin: center center;
            transition: transform 0.1s ease-out; 
            touch-action: none; 
        }

        .map-container img {
            width: 100%;
            height: auto;
            display: block;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* PUNTOS INTERACTIVOS */
        .hotspot {
            position: absolute;
            width: 6%;  
            height: 6%; 
            border-radius: 50%;
            background: rgba(212, 178, 133, 0); 
            border: 2px solid transparent;      
            cursor: pointer;
            transform: translate(-50%, -50%); 
            transition: background 0.3s ease, border-color 0.3s ease, transform 0.2s ease;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent; 
            z-index: 10; 
        }

        .hotspot:hover {
            background: rgba(212, 178, 133, 0.3); 
            border-color: rgba(255, 255, 255, 0.7);
            transform: translate(-50%, -50%) scale(1.1);
        }

        .hotspot.destello {
            background: rgba(212, 178, 133, 0.6) !important;
            border-color: #d4b285 !important;
            box-shadow: 0 0 20px #d4b285, 0 0 40px #d4b285;
            animation: parpadeo 0.5s ease infinite alternate;
        }

        @keyframes parpadeo {
            0% { transform: translate(-50%, -50%) scale(1); }
            100% { transform: translate(-50%, -50%) scale(1.4); }
        }

        /* BOTÓN FLOTANTE DE LEYENDA */
        .leyenda-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            background: #2a221a;
            color: #d4b285;
            border: 2px solid #d4b285;
            padding: 8px 16px;
            font-family: 'Georgia', serif;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            z-index: 50;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            -webkit-tap-highlight-color: transparent;
        }

        /* CONTENEDOR DE CONTROLES DERECHOS */
        .side-controls {
            position: fixed;
            top: 70px;
            right: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 50;
        }

        .control-btn {
            background: #2a221a;
            color: #d4b285;
            border: 2px solid #d4b285;
            width: 42px;
            height: 42px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }

        .control-btn:active {
            background: #d4b285;
            color: #1a1510;
        }

        /* PANTALLAS EMERGENTES */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none; 
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: #2a221a;
            border: 3px solid #d4b285;
            border-radius: 10px;
            width: 85%;
            max-width: 450px;
            max-height: 80vh;
            padding: 25px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            transform: scale(0.8);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        .modal-title {
            color: #d4b285;
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 12px;
            border-bottom: 1px solid #3a2f21;
            padding-bottom: 8px;
        }

        .lista-lugares {
            overflow-y: auto;
            text-align: left;
            margin-bottom: 15px;
            padding-right: 5px;
        }

        .categoria-titulo {
            color: #d4b285;
            font-size: 1rem;
            margin-top: 15px;
            margin-bottom: 5px;
            border-bottom: 1px dashed #3a2f21;
        }

        .lugar-item {
            padding: 8px 5px;
            color: #e5d4bc;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.95rem;
            transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .lugar-item:active, .lugar-item:hover {
            background: rgba(212, 178, 133, 0.2);
            color: #fff;
        }

        .modal-desc {
            color: #e5d4bc;
            font-size: 1.05rem;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .close-btn {
            background: #d4b285;
            color: #1a1510;
            border: none;
            padding: 10px 24px;
            font-family: 'Georgia', serif;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
    </style>
</head>
<body>

    <button class="leyenda-btn" onclick="abrirLeyenda()">📜 Leyenda</button>

    <div class="side-controls">
        <button class="control-btn" onclick="hacerZoomIn(0.4)">+</button>
        <button class="control-btn" title="Ajustar Pantalla" onclick="restablecerVista()">🔄</button>
        <button class="control-btn" id="fullscreen-btn" onclick="alternarPantallaCompleta()">📱</button>
    </div>

    <div class="map-wrapper" id="map-wrapper">
        <div class="map-container" id="map-container">
            <img src="mapa.png" alt="Valle del Novilunio">

            <div id="spot-1" class="hotspot" style="left: 44.5%; top: 41.5%;" role="button" onclick="abrirPopUp('1. Plaza Mayor', 'El corazón del pueblo. Un lugar ideal para observar quién entra y sale.')"></div>
            <div id="spot-2" class="hotspot" style="left: 43.2%; top: 34.2%;" role="button" onclick="abrirPopUp('2. Ayuntamiento', 'El archivo municipal guarda documentos de 1996 que nadie quiere que salgan a la luz.')"></div>
            <div id="spot-3" class="hotspot" style="left: 35.5%; top: 32.5%;" role="button" onclick="abrirPopUp('3. Iglesia de Santa Ana', 'La vieja parroquia del pueblo. El párroco esconde algo bajo el altar...')"></div>
            <div id="spot-4" class="hotspot" style="left: 15.2%; top: 40.8%;" role="button" onclick="abrirPopUp('4. Instituto Sierra del Novilunio', 'Donde los jóvenes estudian y los secretos locales se heredan de clase en clase.')"></div>
        </div>
    </div>

    <div class="modal-overlay" id="leyenda-overlay" onclick="document.getElementById('leyenda-overlay').classList.remove('active')">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h2 class="modal-title">Lugares de Interés</h2>
            <div class="lista-lugares">
                <div class="categoria-titulo">EDIFICIOS PÚBLICOS</div>
                <div class="lugar-item" onclick="enfocarLugar('spot-1')">1. Plaza Mayor</div>
                <div class="lugar-item" onclick="enfocarLugar('spot-2')">2. Ayuntamiento</div>
                <div class="lugar-item" onclick="enfocarLugar('spot-3')">3. Iglesia de Santa Ana</div>
                <div class="lugar-item" onclick="enfocarLugar('spot-4')">4. Instituto Sierra del Novilunio</div>
            </div>
            <button class="close-btn" onclick="document.getElementById('leyenda-overlay').classList.remove('active')">Cerrar</button>
        </div>
    </div>

    <div class="modal-overlay" id="popup-overlay" onclick="document.getElementById('popup-overlay').classList.remove('active')">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h2 class="modal-title" id="popup-titulo">Título</h2>
            <p class="modal-desc" id="popup-descripcion">Descripción...</p>
            <button class="close-btn" onclick="document.getElementById('popup-overlay').classList.remove('active')">Volver al mapa</button>
        </div>
    </div>

    <script>
        let nivelZoom = 1.0;
        const maxZoom = 4.0;
        const minZoom = 1.0;

        const wrapper = document.getElementById('map-wrapper');
        const contenedor = document.getElementById('map-container');

        let dobleToqueDistanciaOriginal = 0;
        let zoomOriginalAlTocar = 1.0;
        let estaPellizcando = false;

        // ZOOM CON DOS DEDOS
        wrapper.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                estaPellizcando = true;
                dobleToqueDistanciaOriginal = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
                zoomOriginalAlTocar = nivelZoom;
            }
        }, { passive: true });

        wrapper.addEventListener('touchmove', (e) => {
            if (estaPellizcando && e.touches.length === 2) {
                const nuevaDistancia = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
                const factorCambio = nuevaDistancia / dobleToqueDistanciaOriginal;
                let nuevoZoom = zoomOriginalAlTocar * factorCambio;

                if (nuevoZoom > maxZoom) nuevoZoom = maxZoom;
                if (nuevoZoom < minZoom) nuevoZoom = minZoom;

                if (nuevoZoom !== nivelZoom) {
                    const centroX = wrapper.scrollLeft + (wrapper.clientWidth / 2);
                    const centroY = wrapper.scrollTop + (wrapper.clientHeight / 2);
                    const antiguoZoom = nivelZoom;

                    nivelZoom = nuevoZoom;
                    contenedor.style.transform = `scale(${nivelZoom})`;
                    contenedor.style.width = `${100 * nivelZoom}%`;

                    const factorRedimension = nivelZoom / antiguoZoom;
                    wrapper.scrollLeft = (centroX * factorRedimension) - (wrapper.clientWidth / 2);
                    wrapper.scrollTop = (centroY * factorRedimension) - (wrapper.clientHeight / 2);
                }
            }
        }, { passive: true });

        wrapper.addEventListener('touchend', (e) => {
            if (e.touches.length < 2) { estaPellizcando = false; }
        });

        // BOTÓN ZOOM IN
        function hacerZoomIn(valor) {
            if (nivelZoom >= maxZoom) return;
            const centroX = wrapper.scrollLeft + (wrapper.clientWidth / 2);
            const centroY = wrapper.scrollTop + (wrapper.clientHeight / 2);
            const antiguoZoom = nivelZoom;

            nivelZoom += valor;
            if (nivelZoom > maxZoom) nivelZoom = maxZoom;

            contenedor.style.transform = `scale(${nivelZoom})`;
            contenedor.style.width = `${100 * nivelZoom}%`;

            const factorRedimension = nivelZoom / antiguoZoom;
            wrapper.scrollLeft = (centroX * factorRedimension) - (wrapper.clientWidth / 2);
            wrapper.scrollTop = (centroY * factorRedimension) - (wrapper.clientHeight / 2);
        }

        // BOTÓN RESTABLECER
        function restablecerVista() {
            nivelZoom = 1.0;
            contenedor.style.transform = `scale(1)`;
            contenedor.style.width = `100%`;
            wrapper.scrollTo({ top: 0, left: 0, behavior: 'smooth' });
        }

        // PANTALLA COMPLETA
        function alternarPantallaCompleta() {
            const doc = document.documentElement;
            const boton = document.getElementById('fullscreen-btn');

            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (doc.requestFullscreen) { doc.requestFullscreen(); } 
                else if (doc.webkitRequestFullscreen) { doc.webkitRequestFullscreen(); }
                boton.innerText = "✖";
            } else {
                if (document.exitFullscreen) { document.exitFullscreen(); } 
                else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
                boton.innerText = "📱";
            }
        }

        function abrirLeyenda() {
            document.getElementById('leyenda-overlay').classList.add('active');
        }

        function abrirPopUp(titulo, descripcion) {
            document.getElementById('popup-titulo').innerText = titulo;
            document.getElementById('popup-descripcion').innerText = descripcion;
            document.getElementById('popup-overlay').classList.add('active');
        }

        // FUNCIÓN MEJORADA: ENFOCAR Y CENTRAR EL EDIFICIO PERFECTAMENTE
        function enfocarLugar(idSpot) {
            // 1. Cerramos el menú de la leyenda
            document.getElementById('leyenda-overlay').classList.remove('active');
            
            // 2. Si está en vista general alejada, aplicamos un zoom cómodo para ver los detalles
            if (nivelZoom === 1.0) {
                nivelZoom = 1.6;
                contenedor.style.transform = `scale(${nivelZoom})`;
                contenedor.style.width = `${100 * nivelZoom}%`;
            }
            
            const spot = document.getElementById(idSpot);
            if (spot) {
                // Le damos una micra de tiempo para que se asiente el tamaño del mapa antes de mover el scroll
                setTimeout(() => {
                    // Calculamos la posición del círculo en el mapa escalado
                    const spotRect = spot.getBoundingClientRect();
                    const wrapperRect = wrapper.getBoundingClientRect();
                    
                    // Calculamos la distancia exacta para centrarlo horizontal y verticalmente
                    const destinoX = wrapper.scrollLeft + (spotRect.left - wrapperRect.left) - (wrapper.clientWidth / 2) + (spotRect.width / 2);
                    const destinoY = wrapper.scrollTop + (spotRect.top - wrapperRect.top) - (wrapper.clientHeight / 2) + (spotRect.height / 2);
                    
                    // Desplazamos la pantalla de forma súper suave hasta el centro exacto
                    wrapper.scrollTo({
                        left: destinoX,
                        top: destinoY,
                        behavior: 'smooth'
                    });
                    
                    // Hacemos que brille
                    spot.classList.add('destello');
                    setTimeout(() => spot.classList.remove('destello'), 3000);
                }, 150);
            }
        }
    </script>

</body>
</html>
